services:
  - type: web
    name: tc-yp-cottage
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: gift-data
      mountPath: /var/data
      sizeGB: 1
